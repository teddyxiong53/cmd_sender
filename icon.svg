<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0078D7"/>
      <stop offset="100%" stop-color="#005A9E"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect x="2" y="2" width="60" height="60" rx="12" ry="12" fill="url(#bg)"/>

  <!-- 终端提示符 >_ -->
  <text x="13" y="41" font-family="Consolas, monospace" font-size="28" font-weight="bold" fill="white">&gt;_</text>

  <!-- 右下角小发送箭头 -->
  <polygon points="42,48 52,38 52,44 58,38 58,52 52,46 52,52" fill="#FFD700" transform="translate(0,0)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </polygon>
</svg>
